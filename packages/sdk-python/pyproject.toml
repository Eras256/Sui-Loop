[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "suiloop"
version = "0.1.0"
authors = [
  { name="SuiLoop Protocol", email="dev@suiloop.io" },
]
description = "Official Python SDK for SuiLoop Autonomous Agent Protocol"
readme = "README.md"
requires-python = ">=3.8"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "requests>=2.31.0",
    "websockets>=12.0",
    "asyncio>=3.4.3"
]

[project.urls]
"Homepage" = "https://github.com/Eras256/Sui-Loop"
