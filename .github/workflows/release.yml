name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    
    defaults:
      run:
        working-directory: packages/desktop

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
        working-directory: .

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './packages/desktop/src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: .

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'SuiLoop Companion ${{ github.ref_name }}'
          releaseBody: |
            ## SuiLoop Companion App

            Desktop companion for monitoring your autonomous trading agents.

            ### ✨ What's New in v0.0.8
            - **Real Yield Display**: Shows live profit from on-chain `LoopExecuted` events
            - **SuiScan Integration**: One-click button to open every transaction on SuiScan Testnet
            - **LLM Status Indicator**: Visual badge showing when the AI is actively validating trades
            - **USDC Pool Monitor**: Live status of the USDC MockPool (20 USDC pool)
            - **Real Log Feed**: WebSocket now streams real backend agent logs

            ### Downloads
            - **Linux**: `.AppImage` or `.deb`
            - **macOS**: `.dmg` (Universal Binary — Intel + Apple Silicon)
            - **Windows**: `.exe` or `.msi`

            See [documentation](https://github.com/Eras256/Sui-Loop) for setup instructions.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
